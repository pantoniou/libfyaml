name: CMake CI

run-name: >-
  ${{ github.event_name == 'schedule'          && 'CMake CI · daily' ||
      github.event_name == 'pull_request'       && format('CMake CI · PR #{0}', github.event.pull_request.number) ||
      github.event_name == 'workflow_dispatch'  && format('CMake CI · manual · job={0} os={1}', inputs.job || 'all', inputs.os || 'all') ||
      format('CMake CI · {0} · {1}', github.ref_name, github.event.head_commit.message) }}

env:
  CMAKE_BUILD_PARALLEL_LEVEL: ${{ vars.NUMBER_OF_PROCESSORS || 2 }}
  CTEST_PARALLEL_LEVEL: ${{ vars.NUMBER_OF_PROCESSORS || 2 }}
  CTEST_OUTPUT_ON_FAILURE: 1      # show output only on failure (replaces --output-on-failure)

on:
  push:
    branches: [ master, reflection-new5 ]
  pull_request:
    branches: [ master, reflection-new5 ]
  schedule:
    - cron: '0 2 * * *'   # daily complete run at 02:00 UTC
  workflow_dispatch:
    inputs:
      os:
        description: "OS to run (e.g. ubuntu-latest, macos-latest, windows-latest)"
        required: false
        default: ""
      compiler:
        description: "Compiler (e.g. gcc, clang, msvc)"
        required: false
        default: ""
      build_type:
        description: "Build type (Debug or Release)"
        required: false
        default: ""
      job:
        description: "Job to run (build, asan, smoke, or empty for all)"
        required: false
        default: ""
      ctest_args:
        description: "Extra ctest arguments (e.g. -R foo, -E bar, -V)"
        required: false
        default: ""

jobs:
  # ===========================================
  # Generate filtered matrices for all jobs
  # ===========================================
  generate-matrix:
    name: Generate matrix
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.gen.outputs.build }}
      asan: ${{ steps.gen.outputs.asan }}
      smoke: ${{ steps.gen.outputs.smoke }}
      has_build: ${{ steps.gen.outputs.has_build }}
      has_asan: ${{ steps.gen.outputs.has_asan }}
      has_smoke: ${{ steps.gen.outputs.has_smoke }}
    steps:
    - id: gen
      shell: python3 {0}
      run: |
        import json, os

        f = {"os": "${{ inputs.os }}", "compiler": "${{ inputs.compiler }}", "build_type": "${{ inputs.build_type }}"}
        f = {k: v for k, v in f.items() if v}
        job = "${{ inputs.job }}"
        event = "${{ github.event_name }}"

        # fast mode: push/PR with no manual overrides - Linux only, no asan/smoke
        fast = event in ('push', 'pull_request') and not f and not job

        def filt(name, rows):
            if job and job != name:
                return {"include": []}
            return {"include": [r for r in rows if all(r.get(k) == v for k, v in f.items())]}

        def expand(os_comps, build_types):
            return [{"os": o, "compiler": c, "cc": cc, "cxx": cxx, "build_type": bt, "python-version": "3.11"}
                    for o, comps in os_comps for c, cc, cxx in comps for bt in build_types]

        build_comps = [
            ("ubuntu-latest",  [("gcc", "gcc", "g++"), ("clang", "clang-18", "clang++-18")]),
            ("macos-latest",   [("gcc", "gcc", "g++"), ("clang", "clang", "clang++")]),
            ("windows-latest", [("msvc", "cl", "cl"), ("clang", "clang", "clang++")]),
        ]
        asan_comps = [
            ("ubuntu-latest",  [("gcc", "gcc", "g++"), ("clang", "clang-18", "clang++-18")]),
            ("macos-latest",   [("clang", "clang", "clang++")]),
        ]
        smoke_oses = ["ubuntu-24.04", "ubuntu-22.04", "macos-14", "windows-2022", "ubuntu-24.04-arm"]

        # fast matrix: ubuntu only, no asan/smoke
        fast_comps = [("ubuntu-latest", [("gcc", "gcc", "g++"), ("clang", "clang-18", "clang++-18")])]

        # manual dispatch overrides exclusions
        manual = bool(f) or bool(job)

        if fast:
            build_out = {"include": expand(fast_comps, ['Debug', 'Release'])}
            asan_out  = {"include": []}
            smoke_out = {"include": []}
        else:
            build_out = filt('build', expand(build_comps, ['Debug','Release']))
            asan_out  = filt('asan',  expand(build_comps if manual else asan_comps, ['Debug']))
            smoke_out = filt('smoke', [{'os': o, 'build_type': 'Release', 'python-version': '3.11'} for o in smoke_oses])

        with open(os.environ["GITHUB_OUTPUT"], "a") as out:
            out.write(f"build={json.dumps(build_out)}\n")
            out.write(f"asan={json.dumps(asan_out)}\n")
            out.write(f"smoke={json.dumps(smoke_out)}\n")
            out.write(f"has_build={'true' if build_out['include'] else 'false'}\n")
            out.write(f"has_asan={'true' if asan_out['include'] else 'false'}\n")
            out.write(f"has_smoke={'true' if smoke_out['include'] else 'false'}\n")

  # ===========================================
  # Main build matrix - full test suite
  # ===========================================
  build:
    name: ${{ matrix.os }} - ${{ matrix.compiler }} - ${{ matrix.build_type }}
    needs: generate-matrix
    if: needs.generate-matrix.outputs.has_build == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.build) }}

    steps:
    - &checkout {
        uses: actions/checkout@v4
      }

    - &setup-python {
        name: Setup python,
        uses: actions/setup-python@v5,
        with: {
          python-version: "${{ matrix.python-version }}"
        }
      }

    - &setup-msvc {
        name: Setup MSBuild,
        if: runner.os == 'Windows',
        uses: microsoft/setup-msbuild@v2,
      }

    - &install-ubuntu {
        name: "Install dependencies (Ubuntu)",
        if: runner.os == 'Linux',
        run: "sudo apt-get update -qq\n\
              sudo apt-get install --no-install-recommends -y cmake ninja-build pkg-config check libyaml-dev libltdl-dev libblocksruntime-dev libclang-dev llvm-dev libubsan1 ${{ matrix.cc }} ${{ matrix.cxx }}"
      }

    - &install-macos {
        name: "Install dependencies (macOS)",
        if: runner.os == 'macOS',
        run: "brew update\n\
              brew install cmake ninja pkg-config check libyaml gcc@13 llvm"
      }

    - &install-windows {
        name: "Install dependencies (Windows)",
        if: runner.os == 'Windows',
        run: "git config --global core.autocrlf false\n\
              choco install cmake ninja pkgconfiglite",
      }

    - &install-python {
        name: "Install python",
        run: "python -m pip install --upgrade pip\n\
              pip install pytest"
      }

    - &set-env {
        name: "Set compiler environment",
        if: "runner.os != 'Windows' || matrix.compiler != 'msvc'",
        run: "echo \"CC=${{ matrix.cc }}\" >> $GITHUB_ENV && echo \"CXX=${{ matrix.cxx }}\" >> $GITHUB_ENV"
      }

    - &configure-unix {
        name: "Configure (Unix)",
        if: "runner.os != 'Windows' || matrix.compiler != 'msvc'",
        run: "cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}"
      }

    - &configure-windows {
        name: "Configure (Windows)",
        if: "runner.os == 'Windows' && matrix.compiler == 'msvc'",
        run: "cmake -B build -A x64 -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}"
      }

    - &build-step {
        name: Build,
        run: "cmake --build build --config ${{ matrix.build_type }}"
      }

    - &test-unix {
        name: Test (Unix),
        if: runner.os != 'Windows',
        working-directory: build,
        run: "ctest --quiet ${{ inputs.ctest_args }}",
      }

    - &test-windows {
        name: Test (Windows),
        if: runner.os == 'Windows',
        working-directory: build,
        run: "ctest --quiet -C ${{ matrix.build_type }} ${{ inputs.ctest_args }}",
      }

    - &upload-logs {
        name: "Upload test logs on failure",
        if: failure(),
        uses: actions/upload-artifact@v4,
        with: {
          name: "test-logs-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-build-${{ github.run_id }}",
          path: "build/Testing/Temporary/\nbuild/**/*.log"
        }
      }

  # ===========================================
  # ASAN builds - Debug only
  # ===========================================
  asan:
    name: ASAN - ${{ matrix.os }} - ${{ matrix.compiler }}
    needs: generate-matrix
    if: needs.generate-matrix.outputs.has_asan == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.asan) }}

    steps:
    - *checkout
    - *setup-python
    - *setup-msvc
    - *install-ubuntu
    - *install-macos
    - *install-windows
    - *install-python
    - *set-env
    - {
        name: "Configure ASAN (Unix)",
        if: runner.os != 'Windows',
        run: "cmake -B build -G Ninja -DENABLE_ASAN=On -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}"
      }
    - *build-step
    - *test-unix
    - *test-windows
    - *upload-logs

  # ===========================================
  # Smoke tests - pinned latest versions
  # ===========================================
  smoke-pinned:
    name: Smoke - ${{ matrix.os }}
    needs: generate-matrix
    if: needs.generate-matrix.outputs.has_smoke == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.smoke) }}

    steps:
    - *checkout
    - *setup-python
    - *setup-msvc
    - *install-ubuntu
    - *install-macos
    - *install-windows
    - *install-python
    - *set-env
    - {
        name: "Configure smoke (Unix)",
        if: "runner.os != 'Windows' || matrix.compiler != 'msvc'",
        run: "cmake -B build -G Ninja -DBUILD_TESTING=Off -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}",
      }
    - {
        name: "Configure smoke (Windows)",
        if: "runner.os == 'Windows' && matrix.compiler == 'msvc'",
        run: "cmake -B build -A x64 -DBUILD_TESTING=Off -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}"
      }
    - *build-step
    - *upload-logs
